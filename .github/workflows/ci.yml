name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build & Lint the CLI / Backend
  # ─────────────────────────────────────────
  build-cli:
    name: Build CLI & Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install CLI dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

  # ─────────────────────────────────────────
  # Job 2: Build & Lint the React Frontend
  # ─────────────────────────────────────────
  build-ui:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install UI dependencies
        working-directory: ui
        run: npm install

      - name: Lint UI
        working-directory: ui
        run: npm run lint

      - name: Build UI for production
        working-directory: ui
        run: npm run build

  # ─────────────────────────────────────────
  # Job 3: Build the IDE Extension
  # ─────────────────────────────────────────
  build-extension:
    name: Build IDE Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ide-extension/package-lock.json

      - name: Install extension dependencies
        working-directory: ide-extension
        run: npm ci

      - name: Compile extension
        working-directory: ide-extension
        run: npm run compile
